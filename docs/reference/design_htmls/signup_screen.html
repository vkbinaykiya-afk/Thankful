<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/figtree@5/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/figtree@5/500.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Figtree',sans-serif;background:#e8e4dc;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px 16px}
.phone{width:280px;aspect-ratio:9/19.5;border-radius:40px;overflow:hidden;background:#FAFAF8;display:flex;flex-direction:column;box-shadow:0 0 0 1.5px rgba(0,0,0,0.1),0 16px 48px rgba(0,0,0,0.12)}
.sb{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:8.5px;font-weight:500;color:#2C241650;flex-shrink:0}
.an{font-size:18px;font-weight:500;color:#5E9A78;text-align:center;padding:6px 0 4px;flex-shrink:0;letter-spacing:.01em}
.monk-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;min-height:48%}
.monk-wrap img{width:130%;display:block;animation:entry 0.8s ease-out forwards}
@keyframes entry{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.sep{height:0.5px;background:#EAE4D8;flex-shrink:0;margin:0 32px}
.carousel{flex-shrink:0;cursor:pointer;user-select:none;padding:7px 0 5px}
.c-track{display:flex;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1)}
.c-slide{flex-shrink:0;width:100%;display:flex;align-items:center;justify-content:center;padding:0 24px}
.c-word{font-size:12px;font-weight:500;color:#7A7060;letter-spacing:.12em;text-transform:uppercase;text-align:center}
.c-dots{display:flex;justify-content:center;gap:5px;padding:4px 0 2px}
.dot{width:4px;height:4px;border-radius:50%;background:#D8D2CA;transition:all 0.35s ease}
.dot.on{background:#5E9A78;width:14px;border-radius:2px}
.btm{padding:10px 24px 0;flex-shrink:0}
.hl1{font-size:19px;font-weight:500;line-height:1.2;color:#2C2416;display:block}
.hl2{font-size:19px;font-weight:500;line-height:1.2;color:#5E9A78;display:block;margin-bottom:6px}
.sub{font-size:11px;font-weight:400;color:#7A7060;line-height:1.55;margin-bottom:14px}
.auth{display:flex;flex-direction:column;gap:7px;margin-bottom:6px}
.abtn{height:42px;border-radius:100px;border:none;display:flex;align-items:center;gap:10px;padding:0 16px;font-size:12px;font-weight:400;font-family:'Figtree',sans-serif;background:#F0EDE6;color:#2C2416;width:100%;cursor:pointer}
.ai{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.or-row{display:flex;align-items:center;gap:6px;margin:1px 0}
.orl{flex:1;height:0.5px;background:#2C2416;opacity:0.1}
.ort{font-size:9px;color:#A89E8E}
.si-lnk{text-align:center;font-size:10px;color:#A89E8E;margin-top:7px}
.hi{width:64px;height:3.5px;border-radius:2px;background:#2C2416;opacity:0.14;margin:10px auto 16px}
</style>
</head>
