<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thankful — Lhamo Intro Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #E8E4DC;
    font-family: 'Figtree', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
    gap: 12px;
  }

  .label { font-size: 11px; font-weight: 400; color: #A89E8E; }

  .phone {
    width: 375px;
    height: 812px;
    background: #FAFAF8;
    border-radius: 44px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .status {
    height: 44px;
    flex-shrink: 0;
    padding: 0 28px;
    display: flex;
    align-items: center;
  }

  .status-time { font-size: 15px; font-weight: 500; color: #2C2416; }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 22px;
  }

  .app-title {
    font-size: 18px;
    font-weight: 500;
    color: #5E9A78;
    text-align: center;
    margin-bottom: 6px;
  }

  .progress {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 24px;
  }

  .dot { height: 4px; border-radius: 2px; }
  .dot.active  { width: 14px; background: #5E9A78; }
  .dot.inactive { width: 4px;  background: #D8D2CA; }

  .headline-line1 {
    font-size: 28px;
    font-weight: 500;
    color: #2C2416;
    line-height: 1.2;
  }

  .headline-line2 {
    font-size: 28px;
    font-weight: 500;
    color: #5E9A78;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  .body-text {
    font-size: 15px;
    font-weight: 400;
    color: #7A7060;
    line-height: 1.6;
    margin-bottom: 0;
  }

  .monk-wrap {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
    margin: 0 -22px;
  }

  .monk-wrap img {
    width: 119%;
    object-fit: contain;
    object-position: bottom center;
    mix-blend-mode: multiply;
    display: block;
    transform: translateY(-45px);
  }

  .bottom {
    padding: 0 0 24px;
  }

  .cta-btn {
    width: 100%;
    height: 52px;
    background: #E09050;
    border-radius: 100px;
    border: none;
    font-family: 'Figtree', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #FAFAF8;
    cursor: pointer;
  }

  .home-indicator {
    width: 56px;
    height: 4px;
    background: rgba(44,36,22,0.14);
    border-radius: 2px;
    margin: 10px auto 0;
  }
</style>
</head>
