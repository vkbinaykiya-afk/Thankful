<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/figtree@5/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/figtree@5/500.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:"Figtree",sans-serif;
  background:#E8E4DC;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:32px 16px;
}

.phone{
  width:280px;aspect-ratio:9/19.5;border-radius:40px;overflow:hidden;
  background:#FAFAF8;display:flex;flex-direction:column;
  box-shadow:0 0 0 1.5px rgba(0,0,0,0.1);
}

/* Status bar */
.sb{
  display:flex;justify-content:space-between;
  padding:12px 22px 0;
  font-size:8.5px;font-weight:500;color:#2C241650;flex-shrink:0;
}

/* Body */
.body{
  flex:1;padding:36px 22px 12px;
  display:flex;flex-direction:column;
}

/* Beat 1 */
.headline{
  font-size:22px;font-weight:500;
  color:#2C2416;line-height:1.25;
  flex-shrink:0;margin-bottom:6px;
}
.subtext{
  font-size:15px;font-weight:400;
  color:#7A7060;line-height:1.6;
  flex-shrink:0;
}

/* Monk — inline in flow, centered */
.monk-inline{
  display:block;
  width:144px;
  margin:12px auto 12px;
  mix-blend-mode:multiply;
  flex-shrink:0;
  animation:monkEntry 600ms ease-out both;
}

@keyframes monkEntry{
  from{opacity:0;transform:translateY(8px);}
  to  {opacity:1;transform:translateY(0);}
}

/* Beat 2 */
.closing{
  font-size:15px;font-weight:400;
  color:#7A7060;line-height:1.6;
  flex-shrink:0;
}

/* Beat 3 — whisper, sits right below the celebration */
.closing-return{
  font-size:13px;font-weight:400;
  color:#A89E8E;line-height:1.5;
  margin-top:6px;
  flex-shrink:0;
}

.spacer{flex:1;}

/* CTAs */
.cta-area{flex-shrink:0;padding-top:24px;}
.btn-keep{
  width:100%;height:48px;border-radius:100px;
  border:none;background:#E09050;color:#FAFAF8;
  font-size:14px;font-weight:500;
  font-family:"Figtree",sans-serif;
  cursor:pointer;display:block;margin-bottom:12px;
  transition:opacity 100ms ease-in;
}
.btn-keep:active{opacity:.82;}
.btn-cancel{
  display:block;width:100%;
  height:48px;border-radius:100px;
  border:1.5px solid #5E9A78;background:transparent;color:#5E9A78;
  font-size:14px;font-weight:500;
  font-family:"Figtree",sans-serif;
  cursor:pointer;text-align:center;
  transition:background 150ms ease-in;
}
.btn-cancel:active{background:#F0EDE6;}

/* Home indicator */
.hi{
  width:56px;height:3px;border-radius:2px;
  background:#2C2416;opacity:.14;
  margin:18px auto 14px;flex-shrink:0;
}
</style>
</head>
