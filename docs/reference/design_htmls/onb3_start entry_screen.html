<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/figtree@5/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/figtree@5/500.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Figtree",sans-serif;background:#e8e4dc;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px 16px}
.phone{width:280px;aspect-ratio:9/19.5;border-radius:40px;overflow:hidden;background:#FAFAF8;display:flex;flex-direction:column;box-shadow:0 0 0 1.5px rgba(0,0,0,0.1),0 16px 48px rgba(0,0,0,0.12)}
.sb{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:8.5px;font-weight:500;color:#2C241650;flex-shrink:0}
.an{font-size:18px;font-weight:500;color:#5E9A78;text-align:center;padding:5px 0 3px;flex-shrink:0}
.dots{display:flex;gap:4px;padding:6px 22px 0;flex-shrink:0}
.dot{width:4px;height:4px;border-radius:50%;background:#D8D2CA}
.dot.on{background:#5E9A78;width:14px;border-radius:2px}
.body{flex:1;padding:12px 22px 0;display:flex;flex-direction:column;min-height:0}
/* text-heading-1: 22px w500 lh1.25 — two-tone onboarding pattern */
.hl1{font-size:22px;font-weight:500;line-height:1.25;color:#2C2416;display:block}
.hl2{font-size:22px;font-weight:500;line-height:1.25;color:#5E9A78;display:block;margin-bottom:12px}
/* text-body: 15px w400 lh1.6 — encouragement copy */
.sub{font-size:13px;font-weight:400;color:#7A7060;line-height:1.5;margin-bottom:0;flex-shrink:0}
.monk-wrap{flex:1;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;min-height:0;margin-top:6px}
.monk-wrap img{height:100%;width:auto;display:block;mix-blend-mode:multiply;animation:entry .6s ease-out forwards}
@keyframes entry{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.cta-area{padding:0 22px;flex-shrink:0}
/* Primary button: 52px h per design system, text-body (15px w500) */
.btn-p{width:100%;height:48px;border-radius:100px;border:none;background:#E09050;color:#FAFAF8;font-size:15px;font-weight:500;font-family:"Figtree",sans-serif;cursor:pointer}
.hi{width:56px;height:3px;border-radius:2px;background:#2C2416;opacity:.14;margin:10px auto 14px}
</style>
</head>

    <div class="dot"></div>

    <div class="dot on"></div>
  </div>
