<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Thankful — Launch monk entry (reference)</title>
  <!--
    Canonical motion + layout for LaunchScreen monk hero.
    Mirrors thankful_design_system_v2.md §7 (Splash / launch) and §9 Mascot entry.
    Flutter: lib/features/onboarding/screens/launch_screen.dart
  -->
  <style>
    :root {
      --bg: #fafaf8;
      /* CSS ease-out — same curve as Flutter Curves.easeOut */
      --ease-out: cubic-bezier(0, 0, 0.58, 1);
      --monk-enter-duration: 600ms;
      --monk-drift-y: 8px;
      --monk-width: 92vw;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
    }

    /* Hero grows between chrome and divider; monk sits on bottom edge (cropped upward only). */
    .hero {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 120px;
      overflow: hidden;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .monk {
      width: var(--monk-width);
      max-width: 100%;
      height: auto;
      display: block;
      vertical-align: bottom;
      animation: monkEnter var(--monk-enter-duration) var(--ease-out) forwards;
      animation-iteration-count: 1;
      will-change: opacity, transform;
    }

    @keyframes monkEnter {
      from {
        opacity: 0;
        transform: translateY(var(--monk-drift-y));
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <!-- Swap src for monk_namaste.png when previewing in browser -->
      <img class="monk" src="../../assets/mascot/monk_namaste.png" alt="" />
    </div>
  </div>
</body>
</html>
