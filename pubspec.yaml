name: thankful
description: A voice-first gratitude journalling app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.0.0
  supabase_flutter: ^2.12.4
  go_router: ^13.0.0
  purchases_flutter: ^10.0.2
  deepgram_speech_to_text: ^1.0.0
  just_audio: ^0.9.36
  record: ^6.2.0
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  flutter_dotenv: ^5.1.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^6.1.0
  posthog_flutter: ^4.0.0
  sentry_flutter: ^8.14.0
  shared_preferences: ^2.2.2
  provider: ^6.1.2
  lottie: ^3.0.0
  flutter_svg: ^2.3.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/mascot/
    - assets/audio/
